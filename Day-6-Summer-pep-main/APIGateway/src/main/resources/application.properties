spring.application.name=APIGateway
server.port=8013

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=Hello
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://HELLO
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/proo/**

spring.cloud.gateway.server.webmvc.routes[1].id=CartService
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CARTSERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/cart/**
